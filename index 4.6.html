<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<title>STUDENT REGISTRATION</title>

<h1 style="text-align: center;">STUDENT REGISTRATION</h1>

<div style="background-color:black; padding: 40px 35px; width:420px; margin:auto; border-radius:8px;">
<form>

  <label>NAME</label>
  <input type="text" class="form-control mb-3">

  <label>EMAIL</label>
  <input type="email" class="form-control mb-3">

  <label>PHONE NUMBER</label>
  <input type="tel" class="form-control mb-3">

  <label>STUDENT ID</label>
  <input type="text" class="form-control mb-3">

  <label>PASSWORD</label>
  <input type="text" class="form-control mb-3">

  <label>RE-ENTER PASSWORD</label>
  <input type="text" class="form-control mb-3">

  <input class="btn w-100 mt-3 book-btn" type="submit" value="REGISTER">

</form>
</div>

<style>
  body{
    background-image: url(lgpg.jpg);
    background-size: cover;
    background-position: center;
  }

  h1{
    color: beige;
    font-weight: bold;
    margin-bottom: 25px;
  }

  form{
    color:white;
    text-align:left; /* important fix */
  }

  label{
    font-size: 12px;
    margin-bottom: 5px;
    display: block;
    color: #ccc;
  }

  .form-control{
    padding: 10px;
    font-size: 14px;
    border-radius: 4px;
  }

  .book-btn{
    background-color: whitesmoke;
    color: black;
    font-weight: bold;
    padding: 12px;
    border-radius: 4px;
  }

  .book-btn:hover{
    background-color: #005477;
  }

</style>

</body>
</html>
