<!DOCTYPE html>
<html lang="en">
<head>
  <title>College Website</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    h1 {
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
    }
    .card img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      margin: auto;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<h1 class="text-center bg-info p-2">Welcome to Student Portal</h1>

<nav class="navbar navbar-expand-sm navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="college logo.jpg" width="40" height="40">
    </a>
    <a class="navbar-brand" href="#">SRK College Student Portal</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#collapsibleNavbar">
      <span class="navbar-toggler-icon"></span>
    </button>
  </div>
</nav>

<div class="container mt-4">
  <div class="row text-center">

    <!-- Card 1 -->
    <div class="col-md-4 mb-4">
      <div class="card">
        <img src="cs1.jpg" alt="Marks" class="card-img-top rounded-circle">
        <div class="card-body">
          <h4 class="card-title">Marks</h4>
          <p class="card-text">
            <a href="#">Click here</a>
          </p>
        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-md-4 mb-4">
      <div class="card">
        <img src="notice.jpg" alt="Notices" class="card-img-top rounded-circle">
        <div class="card-body">
          <h4 class="card-title">Notices</h4>
          <p class="card-text">
            <a href="#">Click here</a>
          </p>
        </div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col-md-4 mb-4">
      <div class="card">
        <img src="time table.jpg" alt="Time Table" class="card-img-top rounded-circle">
        <div class="card-body">
          <h4 class="card-title">Time Table</h4>
          <p class="card-text">
            <a href="#">Click here</a>
          </p>
        </div>
      </div>
    </div>

  </div>
</div>
<div class="container mt-4">
  <div class="row text-center">

    <!-- Card 1 -->
    <div class="col-md-6 mb-4">
      <div class="card">
        <img src="library record.jpg" alt="Marks" class="card-img-top rounded-circle">
        <div class="card-body">
          <h4 class="card-title">Book records</h4>
          <p class="card-text">
            <a href="#">Click here</a>
          </p>
        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-md-6 mb-4">
      <div class="card">
        <img src="feedback.jpg" alt="Notices" class="card-img-top rounded-circle">
        <div class="card-body">
          <h4 class="card-title">Course feedback</h4>
          <p class="card-text">
            <a href="#">Click here</a>
          </p>
        </div>
      </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
